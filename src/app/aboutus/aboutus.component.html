<div fxLayout="row wrap">
  <div fxFlex.gt-sm="100" fxFlex="100">
    <div class="container-fluid p-3">
      <div class="row ">
        <div class="col-12 ">
          <mat-card class="m-0">
            <card-header>
              <div class="text-start">

              </div>
              <div class="container mb-5">
                <div class="row">
                  <div class="col-12 my-3">
                    <form name="form" #f="ngForm">

                      <label for="Content"></label>

                      <ejs-richtexteditor id="defaultRTE" width="100%" height="250px" name="content"
                        [(ngModel)]="aboutform.content" #content="ngModel" required>
                      </ejs-richtexteditor>
                    </form>
                  </div>

                  <div class="mb-5">
                    <button class="save-btn me-2" (click)="addAboutUs(f)">{{isedit ? 'Update' :'Add'}}</button>

                  </div>
                </div>

              </div>

            </card-header>
          </mat-card>
        </div>
      </div>
    </div>
  </div>
</div>
