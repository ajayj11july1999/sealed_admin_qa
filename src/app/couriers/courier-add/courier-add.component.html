<div fxLayout="row wrap">
  <div fxFlex.gt-sm="100" fxFlex="100">
    <div class="container-fluid mt-3 ">
      <div class="row">
        <div class="col-12 col-padding ">
          <div class="card card-address ">
            <div class="p-3 mobile-padding">
              <div class="container mt-3">
                <div class="top-header mb-3">
                  <div>
                    <h5>Add Courier Partner</h5>
                  </div>
                  <div>
                  </div>

                </div>

                <div class="sub-form">
                  <form name="form" #f="ngForm">
                    <div class="row">
                      <div class="col-sm-12 col-md-2 form-label">
                        <mat-label>Name*</mat-label>
                      </div>
                      <div class="col-sm-12 col-md-10">
                        <mat-form-field>
                          <input matInput placeholder="Enter Name" [(ngModel)]="createForm.name" name="name" required
                            #name="ngModel">
                        </mat-form-field>
                      </div>
                    </div>
                    <div class="row">
                      <div class="col-sm-12 col-md-2 form-label">
                        <mat-label>Mobile*</mat-label>
                      </div>
                      <div class="col-sm-12 col-md-10">
                        <mat-form-field>
                          <input matInput placeholder="Enter Mobile" [(ngModel)]="createForm.mobileNo" name="mobileNo"
                            required #mobileNo="ngModel">
                        </mat-form-field>
                      </div>
                    </div>
                    <div class="row">
                      <div class="col-sm-12 col-md-2 form-label">
                        <mat-label>Email*</mat-label>
                      </div>
                      <div class="col-sm-12 col-md-10">
                        <mat-form-field>
                          <input type="email" matInput placeholder="Enter Email" [(ngModel)]="createForm.email"
                            name="email" required #email="ngModel">
                        </mat-form-field>
                      </div>
                    </div>
                    <!-- <div class="row">
                      <div class="col-sm-12 col-md-2 form-label">
                        <mat-label>Password*</mat-label>
                      </div>
                      <div class="col-sm-12 col-md-10">
                        <mat-form-field>
                          <input type="text" matInput placeholder="Enter Password" [(ngModel)]="createForm.password"
                            name="password" required #password="ngModel">
                        </mat-form-field>
                      </div>
                    </div> -->
                    <div class="row">
                      <div class="col-sm-12 col-md-2 form-label">
                        <mat-label>Address*</mat-label>
                      </div>
                      <div class="col-sm-12 col-md-10">
                        <mat-form-field>
                          <input matInput placeholder="Enter Address" [(ngModel)]="createForm.address.fullAddress"
                            name="fullAddress" required #fullAddress="ngModel">
                        </mat-form-field>
                      </div>
                    </div>
                    <div class="row">
                      <div class="col-sm-12 col-md-2 form-label">
                        <mat-label>LandMark</mat-label>
                      </div>
                      <div class="col-sm-12 col-md-10">
                        <mat-form-field>
                          <input matInput placeholder="Enter landMark" [(ngModel)]="createForm.address.landMark"
                            name="landMark" #landMark="ngModel">
                        </mat-form-field>
                      </div>
                    </div>

                    <div class="row">
                      <div class="col-sm-12 col-md-2 form-label">
                        <mat-label>Pincode*</mat-label>
                      </div>
                      <div class="col-sm-12 col-md-10">
                        <mat-form-field>
                          <input matInput placeholder="Enter Pincode" [(ngModel)]="createForm.address.postalCode"
                            name="postalCode" required #postalCode="ngModel">
                        </mat-form-field>
                      </div>
                    </div>
                    <div class="row">
                      <div class="col-sm-12 col-md-2 form-label">
                        <mat-label>City*</mat-label>
                      </div>
                      <div class="col-sm-12 col-md-10">
                        <mat-form-field>
                          <input matInput placeholder="Enter City" [(ngModel)]="createForm.address.city" name="city"
                            required #city="ngModel">
                        </mat-form-field>
                      </div>
                    </div>
                    <div class="row">
                      <div class="col-sm-12 col-md-2 form-label">
                        <mat-label>State*</mat-label>
                      </div>
                      <div class="col-sm-12 col-md-10">
                        <mat-form-field>
                          <input matInput placeholder="Enter State" [(ngModel)]="createForm.address.state" name="state"
                            required #state="ngModel">
                        </mat-form-field>
                      </div>
                    </div>
                    <div class="row">
                      <div class="col-sm-12 col-md-2 form-label">
                        <mat-label>Country*</mat-label>
                      </div>
                      <div class="col-sm-12 col-md-10">
                        <mat-form-field>
                          <input matInput placeholder="Enter Country" [(ngModel)]="createForm.address.country"
                            name="country" required #country="ngModel">
                        </mat-form-field>
                      </div>
                    </div>
                    <div class="row">
                      <div class="col-sm-12 col-md-2 form-label">
                        <mat-label>Profile Image*</mat-label>
                      </div>
                      <div class="col-sm-12 col-md-10">

                        <mat-form-field *ngIf="createForm.imgUrl == '' || createForm.imgUrl == null">
                          <mat-label>Stamp Image</mat-label>
                          <input matInput [value]="selectedFile?.name || ''" readonly>
                          <button mat-raised-button matSuffix (click)="fileInput.click()">Browse</button>
                          <input type="file" #fileInput (change)="onChange($event.target.files,'profile')"
                            style="display:none">
                        </mat-form-field>

                        <div class="upload-images image_div file_btn" *ngIf="createForm.imgUrl"
                          style="position: relative;">
                          <i class="fa-solid fa-circle-xmark text-danger"
                            style="position: absolute;right: -8px;top: -4px;cursor: pointer;font-size: 14px;background: #fff;border-radius: 12px;"
                            (click)="removeImage('profile')"></i>
                          <img [src]="createForm.imgUrl" width="80px">
                        </div>


                      </div>
                    </div>
                    <div class="row">
                      <div class="col-sm-12 col-md-2 form-label">
                        <mat-label>Driving License*</mat-label>
                      </div>
                      <div class="col-sm-12 col-md-10">

                        <mat-form-field *ngIf="createForm.drivingLicense == '' || createForm.drivingLicense == null">
                          <mat-label>Stamp Image</mat-label>
                          <input matInput [value]="selectedFile?.name || ''" readonly>
                          <button mat-raised-button matSuffix (click)="fileInput.click()">Browse</button>
                          <input type="file" #fileInput (change)="onChange($event.target.files,'driving')"
                            style="display:none">
                        </mat-form-field>

                        <div class="upload-images image_div file_btn" *ngIf="createForm.drivingLicense"
                          style="position: relative;">
                          <i class="fa-solid fa-circle-xmark text-danger"
                            style="position: absolute;right: -8px;top: -4px;cursor: pointer;font-size: 14px;background: #fff;border-radius: 12px;"
                            (click)="removeImage('driving')"></i>
                          <img [src]="createForm.drivingLicense" width="80px">
                        </div>


                      </div>
                    </div>
                    <div class="row">
                      <div class="col-sm-12 col-md-2 form-label">
                        <mat-label>Rc Book *</mat-label>
                      </div>
                      <div class="col-sm-12 col-md-10">
                        <!-- <mat-form-field> -->
                        <!-- <label>Stamp Image</label>
                                    <button mat-raised-button (click)="fileInput.click()">Choose File</button>
                                    <span *ngIf="selectedFile">{{ selectedFile.name }}</span>
                                    <input type="file" #fileInput (change)="onFileSelected($event)" style="display:none"> -->
                        <!-- </mat-form-field> -->
                        <mat-form-field *ngIf="createForm.rcBook == '' || createForm.rcBook == null">
                          <mat-label>Stamp Image</mat-label>
                          <input matInput [value]="selectedFile?.name || ''" readonly>
                          <button mat-raised-button matSuffix (click)="fileInput.click()">Browse</button>
                          <input type="file" #fileInput (change)="onChange($event.target.files,'rcbook')"
                            style="display:none">
                        </mat-form-field>

                        <div class="upload-images image_div file_btn" *ngIf="createForm.rcBook"
                          style="position: relative;">
                          <i class="fa-solid fa-circle-xmark text-danger"
                            style="position: absolute;right: -8px;top: -4px;cursor: pointer;font-size: 14px;background: #fff;border-radius: 12px;"
                            (click)="removeImage('rcbook')"></i>
                          <img [src]="createForm.rcBook" width="80px">
                        </div>


                      </div>
                    </div>
                    <div class="row">
                      <div class="col-sm-12 col-md-2 form-label">
                        <mat-label>Bike Insurance*</mat-label>
                      </div>
                      <div class="col-sm-12 col-md-10">
                        <!-- <mat-form-field> -->
                        <!-- <label>Stamp Image</label>
                                        <button mat-raised-button (click)="fileInput.click()">Choose File</button>
                                        <span *ngIf="selectedFile">{{ selectedFile.name }}</span>
                                        <input type="file" #fileInput (change)="onFileSelected($event)" style="display:none"> -->
                        <!-- </mat-form-field> -->
                        <mat-form-field *ngIf="createForm.insurance == '' || createForm.insurance == null">
                          <mat-label>Stamp Image</mat-label>
                          <input matInput [value]="selectedFile?.name || ''" readonly>
                          <button mat-raised-button matSuffix (click)="fileInput.click()">Browse</button>
                          <input type="file" #fileInput (change)="onChange($event.target.files,'insurance')"
                            style="display:none">
                        </mat-form-field>

                        <div class="upload-images image_div file_btn" *ngIf="createForm.insurance"
                          style="position: relative;">
                          <i class="fa-solid fa-circle-xmark text-danger"
                            style="position: absolute;right: -8px;top: -4px;cursor: pointer;font-size: 14px;background: #fff;border-radius: 12px;"
                            (click)="removeImage()"></i>
                          <img [src]="createForm.insurance" width="80px">
                        </div>


                      </div>
                    </div>
                    <div class="row">
                      <div class="col-sm-12 col-md-2 form-label">
                        <mat-label>Status*</mat-label>
                      </div>
                      <div class="col-sm-12 col-md-10">
                        <mat-form-field>
                          <mat-select placeholder="Select Status" [(ngModel)]="createForm.status" name="status" required
                            #status="ngModel">
                            <mat-option [value]="true">Active</mat-option>
                            <mat-option [value]="false">Inactive</mat-option>
                          </mat-select>
                        </mat-form-field>
                      </div>
                    </div>
                    <div class="row mt-4">
                      <div class="col" style="justify-content: center;
                        display: flex;">
                        <button mat-button mat-flat-button color="primary" (click)="create(f)">
                          Add</button>
                        <button mat-button (click)="cancel()">Cancel</button>
                      </div>
                    </div>
                  </form>
                </div>


              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
