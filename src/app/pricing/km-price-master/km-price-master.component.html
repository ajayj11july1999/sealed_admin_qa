<div fxLayout="row wrap">
  <div fxFlex.gt-sm="100" fxFlex="100">
    <div class="container-fluid mt-3 ">
      <div class="row">
        <div class="col-12 col-padding ">
          <div class="card card-address ">
            <div class="p-3 mobile-padding">
              <div class="container mt-3">
                <div class="top-header mb-3">
                  <div>
                    <h5>KM Price Master</h5>
                  </div>
                  <div>
                    <!-- <button mat-raised-button class="mb-1 export-btn" (click)="downloadExport()">Export</button> -->
                  </div>

                </div>
                <div class="row  p-2 " style="background-color: #F4F4F4;align-items: baseline;">
                  <!-- <div class=""> -->
                  <div class=" col-lg-8 col-md-8 col-4 new-one" (click)="AddModal(addtemplate)">
                    <div *ngIf="!databaseList?.length"><i class="fa fa-plus-circle me-2" aria-hidden="true"></i><span
                        class="add-txt">
                        Add New</span>
                    </div>
                  </div>
                  <div class="col-lg-4 col-md-4 col-8 text-end">
                    <div class="search-box">
                      <input type="text" (input)="searchUserList($event)" class="search-input" placeholder="Search..">

                      <button class="search-button" type="submit" value="search">
                        <i class="fa fa-search"></i>
                      </button>
                    </div>
                  </div>




                </div>
                <div class="tab_button mt-3">
                  <button class="samebutton" (click)="copyTable()">Copy </button>
                  <button class="samebutton" (click)="exportAsXLSX()">CSV </button>
                  <button class="samebutton" (click)="exportAsPdf()">PDF</button>
                  <button class="samebutton" (click)="printTable()">Print</button>

                </div>
                <div class="card-table">
                  <table id="table" class="table table-striped mb-5 mt-3" style="width:100% !important">
                    <thead>
                      <tr>
                        <th>Sl.NO</th>
                        <th>KM WISE</th>
                        <th>Amount</th>
                        <th>TYPE</th>
                        <th>Action</th>


                      </tr>
                    </thead>
                    <tbody>

                      <tr *ngFor="let item of databaseList; let i= index;">

                        <td>
                          {{i+1 + (myPaginator.pageIndex * myPaginator.pageSize)}}
                        </td>
                        <td class="checkname ">
                          <p class="ellip" data-toggle="tooltip" title={{item?.name}}> {{item?.name}}</p>

                        </td>
                        <td class="checkname ">
                          <p> {{item?.amount}} </p>

                        </td>
                        <td class="checkname ">
                          <p class="ellip" data-toggle="tooltip" title={{item?.type}}> {{item?.type}} </p>

                        </td>

                        <td class="">
                          <div class=" d-flex justify-content-center te1">
                            <!-- <i class="fa fa-key me-2" aria-hidden="true" (click)="resetPassword(item)" style="color:grey;"></i> -->
                            <i class="fa fa-edit address_edit me-2" (click)="AddModal(addtemplate);editTerms(item)"
                              style="color:#21aa47" aria-hidden="true"></i>
                            <!-- <i (click)="deleteKm(item)" class="fa fa-trash trash_icon" aria-hidden="true"></i> -->
                          </div>
                        </td>
                      </tr>
                    </tbody>
                  </table>
                  <div>
                    <mat-paginator (page)="pageChange($event)" [pageSize]="limit" aria-label="Select page"
                      [length]="totalCount" #myPaginator>
                    </mat-paginator>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>


<ng-template #addtemplate>
  <div class="modal-header">
    <mat-card-title>{{isedit ? 'Edit' :
      'Add'}} Pricing</mat-card-title>
    <button type="button" class="close pull-right" aria-label="Close" (click)="cancel()">
      <span aria-hidden="true">&times;</span>
    </button>
  </div>
  <div class="modal-body">
    <form name="form" #f="ngForm">
      <div class="row">

        <div class="col-md-4 col-sm-12">
          <mat-form-field>
            <input matInput placeholder="KM Wise" [(ngModel)]="createForm.name" name="name" required #name="ngModel"
              disabled>
          </mat-form-field>
        </div>
        <div class="col-md-4 col-sm-12">
          <mat-form-field>
            <input matInput placeholder="KM Amount" [(ngModel)]="createForm.amount" name="amount" required
              #amount="ngModel">
          </mat-form-field>
        </div>


        <div class="col-md-4 col-sm-12">
          <mat-form-field>
            <mat-select placeholder="Category" [(ngModel)]="createForm.type" name="type" required #type="ngModel">
              <mat-option value="B2B">B2B</mat-option>
              <mat-option value="B2C">B2C</mat-option>
            </mat-select>
          </mat-form-field>
        </div>
      </div>

      <div class="row mt-4">
        <div class="col">
          <button mat-button mat-flat-button color="primary" (click)="createkmPriceMaster(f)">{{isedit ? 'Update' :
            'Add'}}</button>
          <button mat-button (click)="cancel()">Cancel</button>
        </div>
      </div>

    </form>
  </div>
</ng-template>
