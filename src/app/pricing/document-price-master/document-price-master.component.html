<div fxLayout="row wrap">
  <div fxFlex.gt-sm="100" fxFlex="100">
    <div class="container-fluid mt-3 ">
      <div class="row">
        <div class="col-12 col-padding ">
          <div class="card card-address ">
            <div class="p-3 mobile-padding">
              <div class="container mt-3">
                <div class="top-header mb-3">
                  <div>
                    <h5>Document Pricing Master</h5>
                  </div>
                  <div>
                    <!-- <button mat-raised-button class="mb-1 export-btn" (click)="downloadExport()">Export</button> -->
                  </div>

                </div>

                <div class="card-table">


                  <table class="table table-striped mb-5 mt-3" style="width:100% !important">
                    <thead>
                      <tr>
                        <th>Sl.NO</th>
                        <th>Category</th>
                        <th>Amount</th>
                        <th>TYPE</th>
                        <th>Action</th>


                      </tr>
                    </thead>
                    <tbody>

                      <tr *ngFor="let item of databaseList; let i= index;">

                        <td>
                          {{i+1+ (myPaginator.pageIndex * myPaginator.pageSize)}}
                        </td>
                        <td class="checkname ">
                          <p class="ellip" data-toggle="tooltip" title={{item?.name}}> {{item?.category}}</p>

                        </td>
                        <td class="checkname ">
                          <p> {{item?.amount}} </p>

                        </td>
                        <td class="checkname ">
                          <p class="ellip" data-toggle="tooltip" title={{item?.type}}> {{item?.type}} </p>

                        </td>

                        <td class="">
                          <div class=" d-flex justify-content-center te1">
                            <!-- <i class="fa fa-key me-2" aria-hidden="true" (click)="resetPassword(item)" style="color:grey;"></i> -->
                            <i *ngIf="userrole !== 'subadmin' || showEdit" class="fa fa-edit address_edit me-2"
                              (click)="AddModal(addtemplate);editTerms(item)" style="color:#21aa47"
                              aria-hidden="true"></i>
                            <!-- <i (click)="deleteUserList(item)" class="fa fa-trash trash_icon" aria-hidden="true"></i> -->
                          </div>
                        </td>
                      </tr>
                    </tbody>
                  </table>
                  <div>
                    <mat-paginator (page)="pageChange($event)" [pageSize]="limit" aria-label="Select page"
                      [length]="totalCount" #myPaginator>
                    </mat-paginator>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>


<ng-template #addtemplate>
  <div class="modal-header">
    <mat-card-title>{{isedit ? 'Edit' :
      'Add'}} Pricing</mat-card-title>
    <button type="button" class="close pull-right" aria-label="Close" (click)="cancel()">
      <span aria-hidden="true">&times;</span>
    </button>
  </div>
  <div class="modal-body">
    <form name="form" #f="ngForm">
      <div class="row">

        <!-- <div class="col-md-4 col-sm-12">
          <mat-form-field>
            <input matInput placeholder="KM Wise" [(ngModel)]="createForm.name" name="name" required #name="ngModel">
          </mat-form-field>
        </div> -->
        <div class="col-12">
          <mat-form-field>
            <input matInput placeholder="KM Amount" [(ngModel)]="createForm.amount" name="amount" required
              #amount="ngModel">
          </mat-form-field>
        </div>


        <!-- <div class="col-md-4 col-sm-12">
          <mat-form-field>
            <mat-select placeholder="Category" [(ngModel)]="createForm.type" name="type" required #type="ngModel">
              <mat-option [value]="B2B">B2B</mat-option>
              <mat-option value="B2C">B2C</mat-option>
            </mat-select>
          </mat-form-field>
        </div> -->
      </div>

      <div class="row mt-4">
        <div class="col">
          <button mat-button mat-flat-button color="primary" (click)="createdocumentPrice(f)">{{isedit ? 'Update' :
            'Add'}}</button>
          <button mat-button (click)="cancel()">Cancel</button>
        </div>
      </div>

    </form>
  </div>
</ng-template>
